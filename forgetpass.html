<!DOCTYPE html>
<html lang="sq">

<head>
<meta charset="UTF-8">
<title>Reset Password - DMS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#9e95a4,#a596aa);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


.reset-card{
display:flex;
width:720px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 15px 40px rgba(127, 2, 127, 0.25);
animation:fadeIn 0.6s ease;
}

.reset-info{
background:linear-gradient(135deg,#5a2978,#8b43a0);
color:white;
padding:40px;
width:45%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.reset-info i{
font-size:55px;
margin-bottom:20px;
}

.reset-info h2{
margin-bottom:10px;
}

.reset-info p{
font-size:14px;
line-height:1.5;
opacity:0.9;
}

.reset-form{
padding:40px;
width:55%;
}

.reset-form h3{
margin-bottom:20px;
color:#521e72;
}

.input-group{
position:relative;
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:12px 35px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.input-group i{
position:absolute;
left:10px;
top:12px;
color:#777;
}
.reset-btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#521e72,#7e2a98);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.reset-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.links{
margin-top:20px;
font-size:14px;
}

.links a{
text-decoration:none;
color:#501961;
font-weight:bold;
}

.links a:hover{
text-decoration:underline;
}



@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="reset-card">


<div class="reset-info">

<i class="fa-solid fa-shield-halved"></i>

<h2>Security</h2>

<p>
Per te mbrojtur llogarine tuaj,
vendosni email-in dhe do te merrni
nje link per te rivendosur password-in.
</p>

</div>


<div class="reset-form">

<h3>Reset Password</h3>

<form>

<div class="input-group">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Shkruani emailin tuaj" required>
</div>

<button class="reset-btn" onclick="window.location.href='resetsent.html'">
Send Reset Link
</button>

</form>

<div class="links">

<p><a href="login1.html">⬅ Kthehu te Login</a></p>

<p><a href="dms1.html">⬅  Faqja kryesore</a></p>

</div>

</div>

</div>

</body>
</html>
